name: Container Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docker-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install project dependencies
        run: uv sync --extra dev

      - name: Run Docker smoke validation
        run: ./scripts/run_docker_integration.sh

  privileged-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run privileged boundary validation
        run: ./scripts/run_privileged_validation.sh
